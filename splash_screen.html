<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background">
<!-- 
        SPLASH SCREEN CANVAS 
        The Shell Visibility & Relevance mandate requires suppression of navigation bars 
        for splashes and onboarding. This is a focused entry point.
    -->
<main class="relative h-screen w-full flex flex-col items-center justify-center overflow-hidden">
<!-- Decorative Ambient Background Elements (Subtle Textures) -->
<div class="absolute inset-0 pointer-events-none opacity-40">
<div class="absolute top-[-10%] left-[-5%] w-[400px] h-[400px] bg-secondary-container/30 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[400px] h-[400px] bg-tertiary-fixed/20 rounded-full blur-[100px]"></div>
</div>
<!-- Main Branding Container -->
<div class="relative z-10 flex flex-col items-center justify-center space-y-4 animate-in fade-in duration-1000 slide-in-from-bottom-4">
<!-- Logo Icon (Leaf/Heart Hybrid) -->
<div class="flex items-center justify-center w-20 h-20 mb-2">
<span class="material-symbols-outlined text-[64px] text-primary" data-icon="eco" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
<!-- Brand Name -->
<!-- Using exact string "CareTrack" as per Content & Identity rules -->
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tighter">
                CareTrack
            </h1>
<!-- Subtle Tagline (Empathetic & Calm) -->
<p class="font-label-md text-label-md text-on-surface-variant/60 tracking-wide">
                Calmly tracking your wellness journey
            </p>
</div>
<!-- Loading / Progress Indicator (Non-punitive, soft) -->
<div class="absolute bottom-24 flex flex-col items-center gap-4">
<div class="w-12 h-[2px] bg-surface-container-highest rounded-full overflow-hidden relative">
<div class="absolute left-0 top-0 h-full w-1/3 bg-primary rounded-full animate-[loading_2s_infinite_ease-in-out]"></div>
</div>
</div>
<!-- Decorative Card Detail (Warm Minimalist Aesthetic) -->
<!-- Subtle shadow profile (20px-40px blur, 5-8% opacity) -->
<div class="absolute -bottom-16 left-1/2 -translate-x-1/2 w-full max-w-sm h-32 bg-white rounded-[24px] shadow-[0_20px_40px_rgba(0,0,0,0.05)] opacity-50"></div>
</main>
<style>
        @keyframes loading {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(200%); }
            100% { transform: translateX(-100%); }
        }
        
        /* Material symbols weight customization */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 48;
        }
    </style>
